<!doctype html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    >
    <meta name="theme-color" content="#000000">
    <title>Zhinflim Splash</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="splash-stage" aria-label="Zhinflim splash screen">
        <section class="poster" aria-label="Zhinflim Streaming and Media Platform">
            <img
                id="splashImage"
                class="poster__image"
                src="zhinflim-splash.jpg"
                alt="Zhinflim Streaming and Media Platform"
                draggable="false"
            >

            <div class="progress-mask" aria-label="Loading">
                <div class="progress-track">
                    <div class="progress-fill">
                        <span class="progress-glow" aria-hidden="true"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <section id="endScreen" class="end-screen" aria-hidden="true">
        <p class="end-screen__text">مردنت نزیکە</p>
    </section>

    <script src="app.js" defer></script>
</body>
</html>
